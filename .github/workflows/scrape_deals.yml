name: Automated Cairns Pub Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI Library
      run: pip install google-genai pydantic

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scrape_pubs.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 1. Stash the freshly generated json out of harm's way
        cp public/deals.json /tmp/deals.json
        
        # 2. Force reset the local branch to perfectly match the remote main
        git fetch origin main
        git checkout main
        git reset --hard origin/main
        
        # 3. Bring the new data file back into position
        cp /tmp/deals.json public/deals.json
        git add public/deals.json
        
        # 4. Commit and push cleanly
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update pub specials via Gemini"
          git push origin main
        else
          echo "No data changes detected. Skipping push."
        fi
