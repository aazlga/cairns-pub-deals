name: Automated Cairns Pub Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI Library
      run: pip install google-generativeai

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scrape_pubs.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add public/deals.json
        git diff-index --quiet HEAD || (git commit -m "Auto-update Crown Hotel pub specials via Gemini" && git push)
