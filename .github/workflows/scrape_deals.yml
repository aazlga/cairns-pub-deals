name: Automated Cairns Pub Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    # Grants the GitHub Action runner explicit permission to write commits back to your repo
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # Fetches all history so rebase operations don't fail on a shallow clone
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI Library
      run: pip install google-genai pydantic

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scrape_pubs.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 1. Pull any remote edits immediately before modifying files to stay synchronized
        git pull origin main --rebase
        
        # 2. Stage and commit changes if there is a difference
        git add public/deals.json
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update pub specials via Gemini"
          git push origin main
        else
          print("No changes detected in deals.json. Skipping push.")
        fi
