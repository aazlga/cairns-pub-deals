name: Automated Cairns Pub Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI Library
      run: pip install google-genai pydantic

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scrape_pubs.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 1. Fetch and pull your latest changes first while the runner stage is completely clean
        git pull origin main --rebase
        
        # 2. Now stage the newly generated deals file
        git add public/deals.json
        
        # 3. Commit and push only if the data actually changed
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update pub specials via Gemini"
          git push origin main
        else
          echo "No changes detected in deals.json. Skipping push."
        fi
